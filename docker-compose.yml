services:
  mythistone-collector:
    image: ghcr.io/mythistone/mythistone-collector:latest
    container_name: mythistone-collector
    network_mode: "host"
    restart: always
    volumes:
      - ./.env:/app/.env:ro
      - ./runs:/app/data/runs
      # shared with the short-lived simc sibling containers
      - simc_io:/app/data/simc_io
      # lets the collector launch simc sibling containers via the Docker SDK
      - /var/run/docker.sock:/var/run/docker.sock
    env_file: .env
    environment:
      - GIT_BRANCH=main
      - CHECK_INTERVAL=60
      # SimulationCraft BiS collector. The collector launches short-lived `--rm`
      # simc sibling containers from SIMC_DOCKER_IMAGE and self-pulls that image
      # on SIMC_PULL_INTERVAL (watchtower cannot track ephemeral containers).
      - SIMC_ENABLED=true
      # Optional override; when unset, simcBis uses max_character_level from the
      # collected seasonInfo.json (derived from wago.tools ContentTuning).
      - SIMC_LEVEL=${SIMC_LEVEL:-}
      - SIMC_DOCKER_IMAGE=${SIMC_DOCKER_IMAGE:-simulationcraftorg/simc:latest}
      - SIMC_IO_DIR=/app/data/simc_io
      - SIMC_IO_VOLUME=mythistone_simc_io
      # --- Resource isolation (2-core host) -------------------------------
      # Pin simc to core 1 ONLY; core 0 is reserved for MySQL + the system, so
      # the co-located DB is never preempted by simc and remote page/social
      # build jobs stop timing out. Hard guarantee, not a "yield under load"
      # hint (cpu_shares can't arbitrate against a host-level mysqld).
      - SIMC_CPUSET=${SIMC_CPUSET:-1}
      # One worker thread to match the single pinned core (extra threads on one
      # core only add context-switch overhead, no speedup).
      - SIMC_THREADS=${SIMC_THREADS:-1}
      # Belt-and-suspenders 1.0-CPU hard cap alongside the cpuset pin.
      - SIMC_CPUS=${SIMC_CPUS:-1}
      # Let simc's profileset disk writes yield bandwidth to MySQL (10-1000).
      - SIMC_BLKIO_WEIGHT=${SIMC_BLKIO_WEIGHT:-100}
      # Optional RAM cap so a big pass can't swap out MySQL. Set e.g. 1g based
      # on the host's free memory; unset = no limit.
      - SIMC_MEM_LIMIT=${SIMC_MEM_LIMIT:-}
      - SIMC_TARGET_ERROR=${SIMC_TARGET_ERROR:-0.1}
      - SIMC_PULL_INTERVAL=${SIMC_PULL_INTERVAL:-21600}
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  watchtower:
    image: nickfedor/watchtower:latest
    container_name: watchtower
    restart: always
    env_file: .env   
    network_mode: "host"          
    environment:
      - WATCHTOWER_POLL_INTERVAL=600
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_TIMEOUT=1200
      - WATCHTOWER_NOTIFICATION_URL=discord://${WEBHOOK_TOKEN}@${WEBHOOK_CHANNEL}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  # Shared between the collector and its short-lived simc sibling containers.
  # Explicit name so `SIMC_IO_VOLUME` matches the real docker volume regardless
  # of the compose project prefix.
  simc_io:
    name: mythistone_simc_io

